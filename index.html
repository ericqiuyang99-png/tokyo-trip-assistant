    function nextChatActionSeq() {
      const value = state.chatActionSeq++;
      localStorage.setItem(STORAGE_KEYS.chatActionSeq, String(state.chatActionSeq));
      return value;
    }

    // Reserved for future cloud sync. This static version does not call it by default.
    async function loadRemoteItinerary() {
      const response = await fetch("/api/itinerary");
      if (!response.ok) throw new Error(`GET /api/itinerary failed: ${response.status}`);
      return response.json();
    }

    // Reserved for future cloud sync. Expected body is the full itinerary JSON.
    async function saveRemoteItinerary(itinerary) {
      const response = await fetch("/api/itinerary", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(itinerary)
      });
      if (!response.ok) throw new Error(`PUT /api/itinerary failed: ${response.status}`);
      return response.json();
    }

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

	    function sanitizeItinerary(raw) {
	      const base = deepClone(DEFAULT_TRIP);
	      ensureItineraryJapaneseNames(base);
	      if (!raw || typeof raw !== "object") return base;

      const next = {
        trip: sanitizeTrip(raw.trip, base.trip),
        days: sanitizeDays(raw.days, base.days)
      };
      return next.days.length ? next : base;
    }

    function sanitizeTrip(rawTrip, fallbackTrip) {
      const trip = rawTrip && typeof rawTrip === "object" ? rawTrip : {};
      return {
        title: String(trip.title || fallbackTrip.title).trim(),
        dates: String(trip.dates || fallbackTrip.dates).trim(),
        hotel: String(trip.hotel || fallbackTrip.hotel).trim(),
        travelers: Number.isFinite(Number(trip.travelers)) && Number(trip.travelers) > 0
          ? Number(trip.travelers)
          : fallbackTrip.travelers
      };
    }

    function sanitizeDays(rawDays, fallbackDays) {
      if (!Array.isArray(rawDays) || !rawDays.length) return deepClone(fallbackDays);

      const days = rawDays.map((rawDay, index) => {
        const fallbackDay = fallbackDays[index] || fallbackDays[0];
        if (!rawDay || typeof rawDay !== "object") return deepClone(fallbackDay);
        const spots = sanitizeSpots(rawDay.spots, fallbackDay.spots);
        return {
          id: Number(rawDay.id) || fallbackDay.id,
          date: String(rawDay.date || fallbackDay.date).trim(),
          label: String(rawDay.label || fallbackDay.label).trim(),
          note: String(rawDay.note || fallbackDay.note).trim(),
          spots
        };
      }).filter(day => Array.isArray(day.spots) && day.spots.length);

      return days.length ? days : deepClone(fallbackDays);
    }

    function sanitizeSpots(rawSpots, fallbackSpots) {
      if (!Array.isArray(rawSpots) || !rawSpots.length) return deepClone(fallbackSpots);
      const spots = rawSpots
        .map((spot, index) => sanitizeSpot(spot, fallbackSpots[index] || fallbackSpots[0]))
        .filter(Boolean);
      return spots.length ? spots : deepClone(fallbackSpots);
    }

    function sanitizeSpot(rawSpot, fallbackSpot) {
      if (!rawSpot || typeof rawSpot !== "object") return deepClone(fallbackSpot);
      return {
	        id: String(rawSpot.id || `spot-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`),
	        name: String(rawSpot.name || fallbackSpot?.name || "未命名地点").trim(),
	        nameJa: String(rawSpot.nameJa || getJapaneseName(rawSpot.name) || fallbackSpot?.nameJa || getJapaneseName(fallbackSpot?.name) || "").trim(),
	        icon: String(rawSpot.icon || fallbackSpot?.icon || "📍").trim(),
        time: String(rawSpot.time || fallbackSpot?.time || "12:00").trim(),
        duration: Number.isFinite(Number(rawSpot.duration)) ? Number(rawSpot.duration) : Number(fallbackSpot?.duration || 60),
        lat: Number.isFinite(Number(rawSpot.lat)) ? Number(rawSpot.lat) : Number(fallbackSpot?.lat || 35.6812),
        lng: Number.isFinite(Number(rawSpot.lng)) ? Number(rawSpot.lng) : Number(fallbackSpot?.lng || 139.7671),
        category: String(rawSpot.category || fallbackSpot?.category || "景点").trim(),
        address: String(rawSpot.address || fallbackSpot?.address || "").trim(),
        desc: String(rawSpot.desc || fallbackSpot?.desc || "").trim(),
        transport: sanitizeTransport(rawSpot.transport, fallbackSpot?.transport),
        ticket: sanitizeTicket(rawSpot.ticket, fallbackSpot?.ticket),
        bestTime: String(rawSpot.bestTime || fallbackSpot?.bestTime || "按当天动线安排").trim(),
        tips: Array.isArray(rawSpot.tips) && rawSpot.tips.length
          ? rawSpot.tips.map(item => String(item).trim()).filter(Boolean)
          : (fallbackSpot?.tips ? deepClone(fallbackSpot.tips) : ["加入前建议确认营业时间"]),
        warning: sanitizeWarning(rawSpot.warning, fallbackSpot?.warning)
      };
    }

    function sanitizeTransport(rawTransport, fallbackTransport) {
      const transport = rawTransport && typeof rawTransport === "object" ? rawTransport : {};
      const fallback = fallbackTransport || {};
      return {
        from: String(transport.from || fallback.from || "上一站").trim(),
        method: String(transport.method || fallback.method || "🚶 步行/电车").trim(),
        duration: String(transport.duration || fallback.duration || "待确认").trim(),
        cost: String(transport.cost || fallback.cost || "待确认").trim()
      };
    }

    function sanitizeTicket(rawTicket, fallbackTicket) {
      const ticket = rawTicket && typeof rawTicket === "object" ? rawTicket : {};
      const fallback = fallbackTicket || {};
      return {
        price: String(ticket.price || fallback.price || "按项目").trim(),
        reservation: ticket.reservation == null ? Boolean(fallback.reservation) : Boolean(ticket.reservation),
        url: String(ticket.url || fallback.url || "").trim()
      };
    }

    function sanitizeWarning(rawWarning, fallbackWarning) {
      if (!rawWarning && !fallbackWarning) return null;
      const warning = rawWarning && typeof rawWarning === "object" ? rawWarning : (fallbackWarning || {});
      if (!warning.text && !warning.level) return null;
      return {
        level: String(warning.level || fallbackWarning?.level || "yellow").trim(),
        text: String(warning.text || fallbackWarning?.text || "").trim()
      };
    }

    function getActiveDay() {
      return getDay(state.activeDayId) || state.itinerary.days[0];
    }

    function getDay(dayId) {
      return state.itinerary.days.find(day => day.id === dayId);
    }

    function getDayBySpot(spotId) {
      return state.itinerary.days.find(day => day.spots.some(spot => spot.id === spotId));
    }

    function findSpot(spotId) {
      return getAllSpots().find(spot => spot.id === spotId);
    }

    function findSpotByName(name) {
      return getAllSpots().find(spot => spot.name === name);
    }

    function getAllSpots() {
      return state.itinerary.days.flatMap(day => day.spots);
    }

    function scrollSpotIntoView(spotId) {
      document.querySelector(`[data-spot-id="${CSS.escape(spotId)}"]`)?.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function warningHtml(warning) {
      if (!warning) return "";
      return `<span class="tag ${escapeAttr(warning.level || "yellow")}">${escapeHtml(warning.text || "")}</span>`;
    }

    function field(name, label, value, type = "text", step = "") {
      const stepAttr = step ? ` step="${escapeAttr(step)}"` : "";
      return `<div class="field"><label>${label}</label><input name="${name}" type="${type}"${stepAttr} value="${escapeAttr(value ?? "")}"></div>`;
    }

	    function spotTemplate(id, name, icon, category, lat, lng, desc, ticketPrice, warning = null) {
	      return {
	        id,
	        name,
	        nameJa: getJapaneseName(name),
	        icon,
        time: "12:00",
        duration: 60,
        lat,
        lng,
        category,
        address: name,
        desc,
        transport: { from: "上一站", method: "🚃 电车/步行", duration: "待确认", cost: "待确认" },
        ticket: { price: ticketPrice, reservation: Boolean(warning?.level === "red"), url: "" },
        bestTime: "按当天动线安排",
        tips: ["加入行程后可编辑具体时间与交通"],
        warning
      };
    }

    function suggestNextTime(day) {
      const last = day.spots.at(-1);
      if (!last?.time) return "12:00";
      const [hour, minute] = last.time.split(":").map(Number);
      const next = new Date(2026, 0, 1, hour || 12, minute || 0);
      next.setMinutes(next.getMinutes() + Number(last.duration || 60) + 30);
      return `${String(next.getHours()).padStart(2, "0")}:${String(next.getMinutes()).padStart(2, "0")}`;
    }

    function formatDateLabel(date) {
      const value = new Date(`${date}T00:00:00`);
      return `${value.getMonth() + 1}月${value.getDate()}日`;
    }

	    function distanceMeters(lat1, lng1, lat2, lng2) {
	      const radius = 6371000;
	      const toRad = value => value * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
	      return radius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
	    }

	    function getJapaneseName(name) {
	      return JAPANESE_NAMES[String(name || "").trim()] || "";
	    }

	    function ensureItineraryJapaneseNames(itinerary) {
	      (itinerary.days || []).forEach(day => {
	        (day.spots || []).forEach(spot => {
	          if (!spot.nameJa) spot.nameJa = getJapaneseName(spot.name);
	        });
	      });
	      return itinerary;
	    }

	    function iconForCategory(category) {
	      const text = String(category || "").toLowerCase();
	      if (text.includes("restaurant") || text.includes("food") || text.includes("餐") || text.includes("食")) return "🍜";
	      if (text.includes("cafe") || text.includes("咖啡")) return "☕";
	      if (text.includes("convenience") || text.includes("便利") || text.includes("shop")) return "🛒";
	      if (text.includes("pharmacy") || text.includes("chemist") || text.includes("药")) return "💊";
	      if (text.includes("park") || text.includes("公园")) return "🌿";
	      if (text.includes("museum") || text.includes("美术") || text.includes("博物")) return "🏛";
	      if (text.includes("station") || text.includes("交通")) return "🚃";
	      return "📍";
	    }

	    async function copyText(text, successMessage = "地址已复制") {
	      try {
	        await navigator.clipboard.writeText(text);
	        showToast(successMessage);
	      } catch (error) {
	        prompt(successMessage, text);
	      }
	    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function omitUndefined(value) {
      return Object.fromEntries(Object.entries(value || {}).filter(([, item]) => item !== undefined));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }
  </script>
